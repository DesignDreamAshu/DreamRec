<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamRec - Recorder</title>
  <style>
    :root {
      --bg-primary: #141414;
      --bg-secondary: #1F1F1F;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-primary: #FAFAFA;
      --text-secondary: #D1D5DB;
      --text-muted: #9CA3AF;
      --accent: #FAFAFA;
      --accent-hover: #E5E5E5;
    }
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      margin: 24px auto; 
      max-width: 640px; 
      padding: 0 16px; 
      background-color: var(--bg-primary);
      background-image: radial-gradient(circle at top left, rgba(255,255,255,0.06), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 50%);
      color: var(--text-primary);
    }
    h1 { font-size: 24px; margin-bottom: 8px; font-weight: 600; }
    .muted { color: var(--text-muted); font-size: 13px; line-height: 1.5; margin-bottom: 16px; }
    .warning-banner {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(251, 191, 36, 0.5);
      background: rgba(251, 191, 36, 0.12);
      color: #fde68a;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 600;
    }
    
    .row { display: flex; gap: 10px; margin: 16px 0; }
    
    button {
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      border-radius: 6px;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    #startBtn {
      background: var(--accent);
      color: var(--bg-primary);
    }
    #startBtn:hover { background: var(--accent-hover); }
    
    #stopBtn {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.2);
    }
    #stopBtn:hover:not(:disabled) {
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
    }
    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: rgba(255,255,255,0.1);
      color: var(--text-muted);
    }
    
    #status { 
      min-height: 40px; 
      border: 1px solid var(--glass-border); 
      padding: 12px; 
      border-radius: 8px; 
      background: var(--bg-secondary); 
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      margin-top: 16px;
    }
    
    @supports (backdrop-filter: blur(10px)) {
      #status {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }
    }
    
    p { color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>
  <h1>DreamRec</h1>
  <div class="warning-banner">
    Warning: Keep this tab open while recording. Closing it will stop and may lose the current recording.
  </div>
  <p class="muted">This page is used so the share dialog opens in the center.</p>
  <div class="row">
    <button id="startBtn">Start Recording</button>
    <button id="stopBtn" disabled>Stop Recording</button>
  </div>
  <p style="margin-top: 8px;">Time: <span id="timer" style="color: var(--text-primary); font-weight: 600;">00:00</span></p>
  <p id="status">Idle</p>
  <script src="recorder-page.js"></script>
</body>
</html>
