<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DreamRec</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; width: 280px; }
    h1 { font-size: 16px; margin: 0 0 10px; }
    label, select, button, p { width: 100%; box-sizing: border-box; }
    select { padding: 6px; margin-bottom: 10px; }
    button { padding: 8px; margin-bottom: 8px; }
    #status { min-height: 40px; border: 1px solid #ccc; padding: 8px; border-radius: 4px; background: #f9f9f9; }
  </style>
</head>
<body>
  <h1>DreamRec</h1>

  <label for="quality">Quality</label>
  <select id="quality">
    <option value="720p">720p (small)</option>
    <option value="1080p" selected>1080p (balanced)</option>
    <option value="1440p">1440p (high)</option>
    <option value="2160p">4K (largest)</option>
  </select>

  <label for="format">Output format</label>
  <select id="format">
    <option value="webm">WebM (recommended)</option>
    <option value="mp4" selected>MP4 (if browser supports)</option>
  </select>

  <label for="sizeMode">Size/Quality mode</label>
  <select id="sizeMode">
    <option value="compat">Compatibility (larger file)</option>
    <option value="balanced">Balanced</option>
    <option value="small" selected>Small size</option>
    <option value="ultra">Ultra small (more compression)</option>
  </select>

  <label for="fps">FPS</label>
  <select id="fps">
    <option value="25">25 FPS</option>
    <option value="30" selected>30 FPS</option>
    <option value="60">60 FPS</option>
  </select>

  <label style="display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 10px;">
    <input type="checkbox" id="saveAsCheckbox" checked>
    Ask where to save (Save As)
  </label>

  <button id="startBtn">Start recording</button>
  <button id="stopBtn" disabled>Stop recording</button>

  <p>Time: <span id="timer">00:00</span></p>
  <p style="font-size: 12px; color: #555; margin-top: -4px;">Start pe click karo, picker se source select karo, phir recording start ho jayegi.</p>
  <p id="status">Idle</p>
  <p id="meetingHint" style="font-size: 12px; color: #555; display: block;">Optimized WebM output (MP4 container not natively supported in browser recorder).</p>

  <script src="popup.js"></script>
</body>
</html>
