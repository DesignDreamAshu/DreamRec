<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamRec</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">
    <h1>DreamRec</h1>
    <section id="authGate">
      <p id="authText" class="status">Sign in required to use recorder.</p>
      <div class="actions">
        <button id="loginBtn" type="button">Sign in with Google</button>
      </div>
    </section>

    <section id="appContent" hidden>
      <div class="history-row" style="margin-bottom:12px;">
        <div>
          <div id="userEmail" class="history-name"></div>
          <div class="history-time">Signed in</div>
        </div>
        <div class="history-actions">
          <button id="logoutBtn" type="button" class="history-btn">Logout</button>
        </div>
      </div>

    <label for="resolution">Resolution</label>
    <select id="resolution">
      <option value="720p">720p</option>
      <option value="1080p" selected>1080p</option>
      <option value="1440p">2K (1440p)</option>
      <option value="2160p">4K (2160p)</option>
      <option value="max">Max</option>
    </select>

    <label for="fps">FPS</label>
    <select id="fps">
      <option value="30" selected>30</option>
      <option value="60">60</option>
    </select>

    <label for="quality">Quality</label>
    <select id="quality">
      <option value="high">High</option>
      <option value="medium" selected>Medium</option>
      <option value="low">Low</option>
    </select>

    <label for="outputMode">Output Format</label>
    <select id="outputMode" disabled>
      <option value="webm" selected>WebM only</option>
    </select>

    <div class="actions">
      <button id="startBtn" type="button">Start Record</button>
      <button id="stopBtn" type="button" disabled>Stop Record</button>
      <button id="downloadBtn" type="button">Refresh History</button>
    </div>

    <div id="history" class="history"></div>
    <p id="status" class="status">Idle</p>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
